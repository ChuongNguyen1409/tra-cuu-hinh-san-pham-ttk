<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tra Cứu Sản Phẩm</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0; padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        h2 { text-align: center; color: #2c3e50; }
        
        /* Container chứa ô tìm kiếm và gợi ý */
        .search-container {
            position: relative;
            margin-bottom: 20px;
        }
        
        .search-box {
            display: flex;
            gap: 10px;
        }
        input[type="text"] {
            flex: 1;
            padding: 12px 15px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 5px;
            outline: none;
        }
        input[type="text"]:focus { border-color: #3498db; }
        button {
            padding: 12px 25px;
            font-size: 16px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover { background-color: #2980b9; }

        /* Hộp Gợi ý (Autocomplete) */
        .suggestions-box {
            position: absolute;
            top: 100%;
            left: 0;
            width: calc(100% - 110px); /* Canh bằng chiều rộng ô input */
            background: #fff;
            border: 1px solid #ccc;
            border-top: none;
            border-radius: 0 0 5px 5px;
            max-height: 250px;
            overflow-y: auto;
            z-index: 10;
            display: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .suggestion-item {
            padding: 10px 15px;
            cursor: pointer;
            border-bottom: 1px solid #eee;
            font-size: 15px;
        }
        .suggestion-item:last-child { border-bottom: none; }
        .suggestion-item:hover { background-color: #f0f8ff; color: #2980b9; }
        .suggestion-item strong { color: #2c3e50; }
        
        /* Giao diện thẻ kết quả */
        .result-card {
            border: 1px solid #e0e0e0;
            padding: 20px;
            margin-top: 15px;
            border-radius: 8px;
            display: flex;
            gap: 20px;
            background: #fafafa;
            align-items: center;
        }
        .result-info { flex: 2; }
        .result-info p { margin: 8px 0; font-size: 15px; line-height: 1.5; }
        .result-image { flex: 1; text-align: center; }
        .result-image img {
            max-width: 100%;
            max-height: 150px;
            cursor: pointer;
            border-radius: 5px;
            border: 1px solid #ddd;
            transition: transform 0.2s;
        }
        .result-image img:hover { transform: scale(1.05); }

        /* Giao diện Modal (Phóng to ảnh) */
        .modal {
            display: none; position: fixed; z-index: 1000; left: 0; top: 0;
            width: 100%; height: 100%; background-color: rgba(0,0,0,0.85);
        }
        .modal-content {
            margin: auto; display: block; max-width: 90%; max-height: 90vh; margin-top: 5vh;
            border-radius: 5px;
        }
        .close {
            position: absolute; top: 15px; right: 35px; color: #f1f1f1;
            font-size: 40px; font-weight: bold; cursor: pointer;
        }
        .close:hover { color: #bbb; }
        .loading { text-align: center; color: #7f8c8d; font-style: italic; }
        
        .tip-box {
            background-color: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 4px;
            font-size: 14px;
            line-height: 1.5;
            color: #856404;
        }
        
        /* Responsive cho điện thoại */
        @media (max-width: 600px) {
            .result-card { flex-direction: column; }
            .search-box { flex-direction: column; }
            .suggestions-box { width: 100%; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Tra Cứu Thông Tin Sản Phẩm</h2>
    
    <div class="tip-box">
        <strong>⚠️Code by Chuong Nguyen.</strong> Name: Nguyen Phi Chuong | Phone: 081 9192 700 | Mew Mew Mew: chuongnguyen0149@gmail.com
    </div>
    
    <div class="search-container">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Nhập Mã sản phẩm hoặc Tên sản phẩm..." autocomplete="off">
            <button onclick="searchProduct()" id="searchBtn">Tìm kiếm</button>
        </div>
        <!-- Vùng hiển thị gợi ý -->
        <div id="suggestions" class="suggestions-box"></div>
    </div>

    <div id="results">
        <p class="loading" id="statusText">Đang tải dữ liệu từ Google Sheets...</p>
    </div>
    <div>
        <p style="text-align: right;">From Chuong Nguyen ưith L0v3 (.❛ ᴗ ❛.)</p>
    </div>
    


</div>

<div id="imageModal" class="modal">
    <span class="close" onclick="closeModal()">&times;</span>
    <img class="modal-content" id="imgModalSrc">
</div>

<script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSh8BRFK8LmWiL_by_a9BZ2CjxVGRwQ84TJn1WVfXe9cft2q74AjnTy1sDZLG0DysHzdEeCi_cojpOB/pub?output=csv';
    let productData = [];

    const searchInput = document.getElementById('searchInput');
    const suggestionsBox = document.getElementById('suggestions');

    // 1. Tải dữ liệu
    window.onload = function() {
        Papa.parse(csvUrl, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                productData = results.data;
                document.getElementById('statusText').innerText = "Muốn tìm cái gì thì nhập mã TTK hoặc tên thường gọi của sản phẩm đó.\n Nếu không có tức là mã này không chuộng nên chưa làm hình, liên hệ MKT để bổ sung theo yêu cầu.";
                
            },
            error: function() {
                document.getElementById('statusText').innerText = "Lỗi khi tải dữ liệu. Vui lòng kiểm tra lại link Google Sheets.";
            }
        });
    };

    // 2. Chuyển đổi link Google Drive (Dùng phương pháp Thumbnail API - có thể hoạt động tốt hơn)
    function getDirectDriveImageUrl(url) {
        if (!url) return '';
        if (url.includes('drive.google.com')) {
            let fileId = '';
            const matchesD = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
            if (matchesD && matchesD[1]) { fileId = matchesD[1]; } 
            else {
                const matchesId = url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
                if (matchesId && matchesId[1]) { fileId = matchesId[1]; }
            }
            if (fileId) {
                // Ép Google tạo hình thu nhỏ (thường ít bị block hơn link full)
                return `https://drive.google.com/thumbnail?id=${fileId}&sz=w1000`;
            }
        }
        return url; 
    }

    // 3. Xử lý tính năng Gợi ý (Autocomplete)
    searchInput.addEventListener('input', function() {
        const val = this.value.toLowerCase().trim();
        suggestionsBox.innerHTML = ''; // Xóa gợi ý cũ
        
        if (!val) { 
            suggestionsBox.style.display = 'none'; 
            return; 
        }

        // Lọc ra các kết quả khớp (giới hạn hiển thị 10 kết quả để không bị lag)
        const matches = productData.filter(item => {
            const maSP = (item['Mã Sản Phẩm'] || item['Mã sản phẩm'] || '').toLowerCase();
            const tenSP = (item['Tên sản phẩm'] || item['Tên Sản Phẩm'] || '').toLowerCase();
            return maSP.includes(val) || tenSP.includes(val);
        }).slice(0, 10); 

        if (matches.length > 0) {
            matches.forEach(match => {
                const maSP = match['Mã Sản Phẩm'] || match['Mã sản phẩm'] || '';
                const tenSP = match['Tên sản phẩm'] || match['Tên Sản Phẩm'] || '';
                
                const div = document.createElement('div');
                div.className = 'suggestion-item';
                div.innerHTML = `<strong>${maSP}</strong> - ${tenSP}`;
                
                // Khi click vào 1 gợi ý
                div.onclick = function() {
                    searchInput.value = maSP; // Gán mã sản phẩm vào ô tìm kiếm
                    suggestionsBox.style.display = 'none'; // Ẩn hộp gợi ý
                    searchProduct(); // Tự động chạy tìm kiếm
                };
                suggestionsBox.appendChild(div);
            });
            suggestionsBox.style.display = 'block';
        } else {
            suggestionsBox.style.display = 'none';
        }
    });

    // Ẩn hộp gợi ý khi click ra ngoài
    document.addEventListener('click', function(e) {
        if(e.target !== searchInput && e.target !== suggestionsBox) {
            suggestionsBox.style.display = 'none';
        }
    });

    // Cho phép ấn Enter để tìm kiếm
    searchInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') { 
            suggestionsBox.style.display = 'none';
            searchProduct(); 
        }
    });

    // 4. Xử lý hiển thị kết quả
    function searchProduct() {
        const keyword = searchInput.value.toLowerCase().trim();
        const resultsContainer = document.getElementById('results');
        
        if (!keyword) {
            resultsContainer.innerHTML = '<p class="loading">Vui lòng nhập từ khóa để tìm kiếm.</p>';
            return;
        }

        resultsContainer.innerHTML = ''; 

        const filtered = productData.filter(item => {
            const maSP = (item['Mã Sản Phẩm'] || item['Mã sản phẩm'] || '').toLowerCase();
            const tenSP = (item['Tên sản phẩm'] || item['Tên Sản Phẩm'] || '').toLowerCase();
            return maSP.includes(keyword) || tenSP.includes(keyword);
        });

        if (filtered.length === 0) {
            resultsContainer.innerHTML = '<p class="loading" style="color: red;">Không tìm thấy sản phẩm nào khớp với từ khóa!</p>';
            return;
        }

        filtered.forEach(item => {
            const maSAP = item['Mã SAP'] || item['Mã Sap'] || 'Trống';
            const maSP = item['Mã Sản Phẩm'] || item['Mã sản phẩm'] || 'Trống';
            const tenSP = item['Tên sản phẩm'] || item['Tên Sản Phẩm'] || 'Trống';
            
            const rawImageUrl = item['Link URL hình ảnh'] || item['Hình ảnh'] || item['Link ảnh'] || item['Hình ảnh sản phẩm'] || '';
            const imageUrl = getDirectDriveImageUrl(rawImageUrl);

            const card = document.createElement('div');
            card.className = 'result-card';
            
            let imageHtml = '<p style="color: #999; font-style: italic;">Chưa có ảnh</p>';
            if(imageUrl && imageUrl.startsWith('http')) {
                // Thêm thẻ div bọc ngoài để xử lý ảnh lỗi
                imageHtml = `<img src="${imageUrl}" alt="${tenSP}" title="Bấm vào để xem chi tiết" onclick="openModal('${imageUrl}')" onerror="this.onerror=null; this.parentElement.innerHTML='<p style=\\'color:red; font-size:12px;\\'>Lỗi tải ảnh. Vui lòng dùng link Postimages.</p>';">`;
            }

            card.innerHTML = `
                <div class="result-info">
                    <p><strong>Mã SAP:</strong> ${maSAP}</p>
                    <p><strong>Mã Sản Phẩm:</strong> ${maSP}</p>
                    <p><strong>Tên sản phẩm:</strong> ${tenSP}</p>
                </div>
                <div class="result-image">
                    ${imageHtml}
                </div>
            `;
            resultsContainer.appendChild(card);
        });
    }

    function openModal(imgSrc) {
        document.getElementById('imageModal').style.display = "block";
        document.getElementById('imgModalSrc').src = imgSrc;
    }

    function closeModal() {
        document.getElementById('imageModal').style.display = "none";
    }

    window.onclick = function(event) {
        const modal = document.getElementById('imageModal');
        if (event.target == modal) {
            modal.style.display = "none";
        }
    }
</script>

</body>
</html>
